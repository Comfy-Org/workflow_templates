name: Version Check and Auto-bump

# This workflow automatically bumps package versions when templates change.
#
# Process:
#   1. Syncs manifests with SHA256 hashes (updates core package manifest.json)
#   2. Validates bundles.json completeness
#   3. Detects which packages have template changes (via git history)
#   4. Bumps version numbers for affected packages (including core if manifest changed)
#   5. Updates meta package dependencies (exact pinning)
#   6. When (and only when) the root pyproject.toml version is bumped, runs the
#      PyPI quota check, refreshes the ComfyUI pins cache if stale, and regenerates
#      the delete-candidates report.
#   7. Commits version-bump + (optionally) cache + report changes back to the PR.
#
# Critical: sync_bundles.py validates that ALL templates are assigned to bundles
# Note: Manifest sync must run BEFORE version detection so core package changes are detected

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'templates/**'
      - 'bundles.json'
      - 'blueprints/**'
      - 'blueprints_bundles.json'
      - 'pyproject.toml'

permissions:
  contents: write
  pull-requests: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    # Only run on same-repo PRs (skip fork PRs as they can't auto-commit)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Prevent concurrent version-check runs on same PR (unique per fork+branch)
    concurrency:
      group: version-check-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.repo.full_name }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          sparse-checkout: |
            templates/
            blueprints/
            bundles.json
            blueprints_bundles.json
            scripts/
            scripts/ci/check_pypi_quota.py
            scripts/ci/comfyui_reference.py
            .github/pypi-packages.json
            packages/
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Sync manifests and bundles (first)
        run: |
          echo "=== Validating bundles.json and syncing manifests ==="
          # This step validates that all templates are assigned to bundles
          # and generates updated manifest files with SHA256 hashes
          # Must run BEFORE version detection so core package manifest.json changes are detected
          #
          # Pip exclusion filter (cloud-only + requiresCustomNodes templates) is ON by default.
          # To temporarily disable it and ship all templates, add --no-filter:
          #   python scripts/sync_bundles.py --no-filter
          python scripts/sync_bundles.py
          echo "✅ Template manifest sync complete"

          echo "=== Syncing blueprints manifests ==="
          # Sync blueprints from blueprints/ to packages/blueprints/
          python scripts/sync_blueprints.py
          echo "✅ Blueprint manifest sync complete"

      - name: Capture pre-bump root version
        id: pre_bump
        run: |
          OLD_VERSION=$(grep -E '^\s*version\s*=' pyproject.toml | head -1 | cut -d'"' -f2)
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Pre-bump root version: $OLD_VERSION"

      - name: Auto-bump package versions if needed
        run: |
          echo "=== Analyzing template changes and bumping versions ==="
          # This runs AFTER manifest sync so it can detect core package changes
          python scripts/ci_version_manager.py
          echo "✅ Version analysis complete"

      - name: Detect whether root version was bumped
        id: bump_detect
        run: |
          NEW_VERSION=$(grep -E '^\s*version\s*=' pyproject.toml | head -1 | cut -d'"' -f2)
          OLD_VERSION="${{ steps.pre_bump.outputs.old_version }}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Root version unchanged ($NEW_VERSION) — skipping PyPI quota check"
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "📦 Root version bumped: $OLD_VERSION → $NEW_VERSION"
          fi

      - name: Check PyPI quota and surface delete-candidates in PR comment
        if: steps.bump_detect.outputs.bumped == 'true'
        id: quota
        env:
          # Use GITHUB_TOKEN to lift the unauthenticated GitHub API rate limit
          # when scanning ComfyUI's requirements.txt commit history.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== PyPI project quota (~10 GB) and per-file size (~100 MB) ==="
          # The script writes the PR comment body to pr-quota-comment.md, which
          # includes the full delete-candidates listing (orphan PyPI versions
          # safe to clean up). The pins cache file is regenerated on disk for
          # the duration of this job but is git-ignored — nothing is committed.
          python scripts/ci/check_pypi_quota.py \
            --comfyui-ref \
            --comment-file pr-quota-comment.md \
            --title "PyPI quota check (version bump PR)"

      - name: Post PyPI quota comment on PR
        if: steps.bump_detect.outputs.bumped == 'true' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pypi-quota-check -->';
            let body;
            try {
              body = fs.readFileSync('pr-quota-comment.md', 'utf8');
            } catch (e) {
              core.info('No quota comment file');
              return;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Commit version bumps, manifest updates, and refreshed cache/report to PR
        run: |
          echo "=== Committing automated changes to PR ==="
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Stage all potential changes from version bumps and manifest sync.
          # The PyPI quota check writes its working cache under .github/cache/,
          # which is git-ignored and never staged.
          git add pyproject.toml packages/*/pyproject.toml packages/*/src/*/manifest.json

          # Only commit when root pyproject.toml version was changed (i.e. auto-bump ran).
          # When version unchanged, ci_version_manager.py skips bump and we skip committing
          # (including manifest.json) to avoid churn on every template-only PR.
          if git diff --cached --quiet; then
            echo "✅ No package version or manifest changes needed"
            exit 0
          fi
          if ! git diff --cached --name-only | grep -q 'pyproject\.toml'; then
            echo "✅ Root version unchanged; skipping commit (no version bump performed)"
            git reset HEAD
            exit 0
          fi
          echo "📝 Version bump and/or manifest changes - committing to PR branch"

          # Commit with retry logic in case of conflicts
          if ! git commit -m "Auto-bump package versions and sync manifests for template changes"; then
            echo "⚠️ Commit failed, possibly due to conflicts. Retrying..."
            if ! git pull origin "${{ github.head_ref }}" --rebase; then
              echo "❌ Rebase failed due to conflicts. Manual intervention required."
              git status
              exit 1
            fi
            git commit -m "Auto-bump package versions and sync manifests for template changes"
          fi

          # Push with retry logic
          if ! git push origin HEAD; then
            echo "⚠️ Push failed, retrying after pull..."
            if ! git pull origin "${{ github.head_ref }}" --rebase; then
              echo "❌ Rebase failed due to conflicts. Manual intervention required."
              git status
              exit 1
            fi
            git push origin HEAD
          fi

          echo "✅ Package version bumps and manifest updates committed to PR"
