name: Version Check and Auto-bump

# This workflow automatically bumps package versions when templates change.
# 
# Process:
#   1. Syncs manifests with SHA256 hashes (updates core package manifest.json)
#   2. Validates bundles.json completeness
#   3. Detects which packages have template changes (via git history)
#   4. Bumps version numbers for affected packages (including core if manifest changed)
#   5. Updates meta package dependencies (exact pinning)
#   6. Commits changes back to PR branch
#
# Critical: sync_bundles.py validates that ALL templates are assigned to bundles
# Note: Manifest sync must run BEFORE version detection so core package changes are detected

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'templates/**'
      - 'bundles.json'
      - 'blueprints/**'
      - 'blueprints_bundles.json'
      - 'pyproject.toml'

permissions:
  contents: write
  pull-requests: write

jobs:
  version-check:
    runs-on: ubuntu-latest
    # Only run on same-repo PRs (skip fork PRs as they can't auto-commit)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Prevent concurrent version-check runs on same PR (unique per fork+branch)
    concurrency:
      group: version-check-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.repo.full_name }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Sync manifests and bundles (first)
        run: |
          echo "=== Validating bundles.json and syncing manifests ==="
          # This step validates that all templates are assigned to bundles
          # and generates updated manifest files with SHA256 hashes
          # Must run BEFORE version detection so core package manifest.json changes are detected
          #
          # Pip exclusion filter (cloud-only + requiresCustomNodes templates) is ON by default.
          # To temporarily disable it and ship all templates, add --no-filter:
          #   python scripts/sync_bundles.py --no-filter
          python scripts/sync_bundles.py
          echo "✅ Template manifest sync complete"

          echo "=== Syncing blueprints manifests ==="
          # Sync blueprints from blueprints/ to packages/blueprints/
          python scripts/sync_blueprints.py
          echo "✅ Blueprint manifest sync complete"

      - name: Check package sizes
        id: size_check
        run: |
          echo "=== Checking package sizes against PyPI 100MB limit ==="

          # PyPI hard limit is 100MB per file. We warn at 85MB and error at 95MB.
          WARN_MB=85
          ERROR_MB=95
          LIMIT_MB=100

          WARN_BYTES=$((WARN_MB * 1024 * 1024))
          ERROR_BYTES=$((ERROR_MB * 1024 * 1024))

          PACKAGES=(
            "media_api:packages/media_api/src/comfyui_workflow_templates_media_api"
            "media_image:packages/media_image/src/comfyui_workflow_templates_media_image"
            "media_video:packages/media_video/src/comfyui_workflow_templates_media_video"
            "media_other:packages/media_other/src/comfyui_workflow_templates_media_other"
          )

          HAS_WARNING=false
          HAS_ERROR=false
          COMMENT_ROWS=""

          for ENTRY in "${PACKAGES[@]}"; do
            PKG_NAME="${ENTRY%%:*}"
            PKG_DIR="${ENTRY##*:}"

            if [ ! -d "$PKG_DIR" ]; then
              echo "⚠️  Directory not found: $PKG_DIR (skipping)"
              continue
            fi

            SIZE_BYTES=$(du -sb "$PKG_DIR" | cut -f1)
            SIZE_MB=$(echo "scale=1; $SIZE_BYTES / 1048576" | bc)

            if [ "$SIZE_BYTES" -ge "$ERROR_BYTES" ]; then
              STATUS="🔴 CRITICAL"
              HAS_ERROR=true
            elif [ "$SIZE_BYTES" -ge "$WARN_BYTES" ]; then
              STATUS="🟡 WARNING"
              HAS_WARNING=true
            else
              STATUS="🟢 OK"
            fi

            echo "$STATUS  $PKG_NAME: ${SIZE_MB}MB / ${LIMIT_MB}MB limit"
            COMMENT_ROWS="${COMMENT_ROWS}| \`comfyui-workflow-templates-${PKG_NAME/_/-}\` | ${SIZE_MB} MB | ${LIMIT_MB} MB | ${STATUS} |\n"
          done

          # Write outputs for the comment step
          echo "has_warning=$HAS_WARNING" >> "$GITHUB_OUTPUT"
          echo "has_error=$HAS_ERROR" >> "$GITHUB_OUTPUT"

          # Build the full comment body and store it (multi-line via delimiter)
          {
            echo "COMMENT_BODY<<EOF"
            if [ "$HAS_ERROR" = "true" ]; then
              echo "## ⚠️ Package Size Warning — Approaching PyPI 100 MB Limit"
              echo ""
              echo "> **One or more packages are critically close to (≥${ERROR_MB} MB) the PyPI 100 MB per-file upload limit.**"
              echo "> Publishing will likely fail unless templates are moved to a different bundle."
            elif [ "$HAS_WARNING" = "true" ]; then
              echo "## ⚠️ Package Size Warning — Approaching PyPI 100 MB Limit"
              echo ""
              echo "> One or more packages are approaching (≥${WARN_MB} MB) the PyPI 100 MB per-file upload limit."
              echo "> Consider moving some templates to a different bundle before this reaches the limit."
            else
              echo "## ✅ Package Sizes OK"
              echo ""
              echo "> All packages are within safe limits."
            fi
            echo ""
            echo "| Package | Estimated Size | Limit | Status |"
            echo "|---------|---------------|-------|--------|"
            printf "$COMMENT_ROWS"
            echo ""
            echo "<sub>Thresholds: 🟡 ≥${WARN_MB} MB (warning) · 🔴 ≥${ERROR_MB} MB (critical) · Limit: ${LIMIT_MB} MB</sub>"
            echo ""
            echo "<sub>_Sizes are measured from the synced package source directories. Actual sdist/wheel may differ slightly._</sub>"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$HAS_ERROR" = "true" ]; then
            echo ""
            echo "❌ One or more packages are critically close to the PyPI 100MB limit!"
            echo "   Move templates to another bundle in bundles.json before publishing."
          fi

      - name: Post package size comment on PR
        if: always()
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.size_check.outputs.COMMENT_BODY }}
        with:
          script: |
            const marker = '<!-- package-size-check -->';
            const body = marker + '\n' + process.env.COMMENT_BODY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Auto-bump package versions if needed
        run: |
          echo "=== Analyzing template changes and bumping versions ==="
          # This runs AFTER manifest sync so it can detect core package changes
          python scripts/ci_version_manager.py
          echo "✅ Version analysis complete"

      - name: Commit version bumps and manifest updates to PR
        run: |
          echo "=== Committing automated changes to PR ==="
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Stage all potential changes from version bumps and manifest sync
          git add pyproject.toml packages/*/pyproject.toml packages/*/src/*/manifest.json

          # Only commit when root pyproject.toml version was changed (i.e. auto-bump ran).
          # When version unchanged, ci_version_manager.py skips bump and we skip committing
          # (including manifest.json) to avoid churn on every template-only PR.
          if git diff --cached --quiet; then
            echo "✅ No package version or manifest changes needed"
            exit 0
          fi
          if ! git diff --cached --name-only | grep -q 'pyproject\.toml'; then
            echo "✅ Root version unchanged; skipping commit (no version bump performed)"
            git reset HEAD
            exit 0
          fi
          echo "📝 Version bump and/or manifest changes - committing to PR branch"

          # Commit with retry logic in case of conflicts
          if ! git commit -m "Auto-bump package versions and sync manifests for template changes"; then
            echo "⚠️ Commit failed, possibly due to conflicts. Retrying..."
            if ! git pull origin "${{ github.head_ref }}" --rebase; then
              echo "❌ Rebase failed due to conflicts. Manual intervention required."
              git status
              exit 1
            fi
            git commit -m "Auto-bump package versions and sync manifests for template changes"
          fi

          # Push with retry logic
          if ! git push origin HEAD; then
            echo "⚠️ Push failed, retrying after pull..."
            if ! git pull origin "${{ github.head_ref }}" --rebase; then
              echo "❌ Rebase failed due to conflicts. Manual intervention required."
              git status
              exit 1
            fi
            git push origin HEAD
          fi

          echo "✅ Package version bumps and manifest updates committed to PR"