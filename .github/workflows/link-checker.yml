name: Link Checker

on:
  pull_request:
    paths:
      - 'templates/**.json'
      - 'scripts/validate/check_links.py'
      - '.github/workflows/link-checker.yml'
      - '.github/workflows/link-check-comment.yml'
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            templates/*.json
            scripts/validate/check_links.py
            scripts/lib/paths.py
            scripts/data/whitelist.json
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lychee
        run: |
          curl -sSL https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.1/lychee-x86_64-unknown-linux-gnu.tar.gz | tar -xz --strip-components=1
          sudo mv lychee /usr/local/bin/
          lychee --version

      - name: Extract links from JSON workflows
        id: extract_links
        run: |
          echo "Extracting links from JSON workflow files..."
          python3 scripts/validate/check_links.py extract > extracted_links.txt 2>&1 || echo "extract_failed=true" >> $GITHUB_OUTPUT
          cat extracted_links.txt

          # Check if extraction succeeded
          if [ -f "links_to_check.txt" ] && [ -s "links_to_check.txt" ]; then
            echo "extract_failed=false" >> $GITHUB_OUTPUT
            echo "Found $(wc -l < links_to_check.txt) links to check"
          else
            echo "extract_failed=true" >> $GITHUB_OUTPUT
            echo "::warning::No links found to check"
          fi

      - name: Check links with lychee
        id: lychee
        if: steps.extract_links.outputs.extract_failed == 'false'
        run: |
          echo "Checking extracted links..."
          link_errors=false

          # lychee may exit non-zero for bad links; disable -e to keep script running
          set +e
          lychee \
            --verbose \
            --no-progress \
            --accept 100..=103,200..=299,429 \
            --timeout 20 \
            --max-retries 3 \
            --exclude 'linkedin\.com' \
            --exclude 'facebook\.com' \
            --exclude 'twitter\.com' \
            --exclude 'x\.com' \
            --format markdown \
            --output lychee-report.md \
            links_to_check.txt

          LYCHEE_EXIT=$?
          set -e

          # If lychee itself failed (non-accepted status codes, network errors, etc.)
          if [ $LYCHEE_EXIT -ne 0 ]; then
            link_errors=true
          fi

          if [ -f lychee-report.md ]; then
            cat lychee-report.md

            # Table-format errors (previous behavior)
            if sed -n '/🚫 Errors/,/^$/p' lychee-report.md | grep -q "^| \["; then
              link_errors=true
            fi

            # Bullet-format errors (e.g., "* [404] ...") under "Errors in ..." sections
            if awk '
              /Errors in/ { err=1; next }
              /^## / { err=0 }
              err && /^\* \[/ { exit 0 }
              END { exit 1 }
            ' lychee-report.md; then
              link_errors=true
            fi

            if [ "$link_errors" = true ]; then
              echo "::error::Broken links found in workflow files"
            fi
          fi

          echo "link_errors=$link_errors" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Generate excluded links report
        id: excluded_report
        if: steps.extract_links.outputs.extract_failed == 'false'
        run: |
          echo "Generating excluded links report..."
          python3 scripts/validate/check_links.py report-excluded > excluded_links.txt 2>&1 || true
          if [ -f "excluded_links.txt" ]; then
            cat excluded_links.txt
          fi

      - name: Generate detailed report for artifacts
        if: steps.extract_links.outputs.extract_failed == 'false'
        run: |
          echo "Generating detailed link report for artifacts..."
          python3 scripts/validate/check_links.py report > link_report_detailed.txt 2>&1 || true

      # PR comments run in link-check-comment.yml via workflow_run (fork-safe token).
      - name: Save results for PR comment
        if: always() && github.event_name == 'pull_request'
        run: |
          mkdir -p /tmp/link-check-results
          echo '{"pr_number":${{ github.event.pull_request.number }},"link_errors":"${{ steps.lychee.outputs.link_errors || 'false' }}"}' > /tmp/link-check-results/results.json
          cp lychee-report.md /tmp/link-check-results/ 2>/dev/null || touch /tmp/link-check-results/lychee-report.md
          cp excluded_links.txt /tmp/link-check-results/ 2>/dev/null || touch /tmp/link-check-results/excluded_links.txt

      - name: Upload PR comment artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: link-check-results
          path: /tmp/link-check-results/
          retention-days: 1

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-reports
          path: |
            extracted_links.txt
            links_to_check.txt
            lychee-report.md
            excluded_links.txt
            link_report_detailed.txt
          retention-days: 7

      - name: Fail if broken links found
        if: steps.lychee.outputs.link_errors == 'true'
        run: |
          echo "❌ Broken links detected in workflow files!"
          echo "Please fix the broken links listed in the report above."
          exit 1
