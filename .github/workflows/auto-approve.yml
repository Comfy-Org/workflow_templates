name: Auto-approve maintainer PRs

# Satisfy branch protection review requirements for trusted maintainers who
# ship solo. Approvals come from github-actions[bot], not the PR author.
#
# Add logins to .github/maintainers.json as the maintainer set grows.

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/maintainers.json
          sparse-checkout-cone-mode: true

      - name: Check maintainer allowlist
        id: maintainer
        run: |
          login="${{ github.event.pull_request.user.login }}"
          if jq -e --arg login "$login" '.maintainers | any(.login == $login)' .github/maintainers.json; then
            echo "approve=true" >> "$GITHUB_OUTPUT"
          else
            echo "approve=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: hmarr/auto-approve-action@v4
        if: steps.maintainer.outputs.approve == 'true'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
