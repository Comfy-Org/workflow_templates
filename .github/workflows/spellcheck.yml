name: Spellcheck

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'templates/**'
      - '.github/.spellcheck.yml'
      - '.github/.spellcheck-workflows.yml'
      - '.github/.wordlist.txt'
      - '.github/workflows/spellcheck.yml'
      - '.github/extract_workflow_text.py'

concurrency:
  group: spellcheck-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          templates/
          .github/
        sparse-checkout-cone-mode: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pyspelling + aspell
      run: |
        sudo apt-get install -y aspell aspell-en
        pip install pyspelling pymdown-extensions

    - name: Extract MarkdownNote text from workflow JSONs
      run: |
        python .github/extract_workflow_text.py \
          --input-dir templates \
          --output-file /tmp/workflow_notes.txt

    - name: Spellcheck templates/index.json
      id: check_index
      run: |
        set +e
        pyspelling --config .github/.spellcheck.yml 2>&1 | tee /tmp/index_errors.txt
        echo "result=$( [ ${PIPESTATUS[0]} -eq 0 ] && echo pass || echo fail )" >> "$GITHUB_OUTPUT"

    - name: Spellcheck workflow JSON notes
      id: check_workflows
      run: |
        set +e
        pyspelling --config .github/.spellcheck-workflows.yml --name "Workflow Notes" --source /tmp/workflow_notes.txt 2>&1 | tee /tmp/workflows_errors.txt
        echo "result=$( [ ${PIPESTATUS[0]} -eq 0 ] && echo pass || echo fail )" >> "$GITHUB_OUTPUT"

    - name: Save results for PR comment
      if: always() && github.event_name == 'pull_request'
      run: |
        mkdir -p /tmp/spellcheck-results
        cat > /tmp/spellcheck-results/results.json << EOF
        {
          "pr_number": ${{ github.event.pull_request.number }},
          "index_result": "${{ steps.check_index.outputs.result || 'fail' }}",
          "workflows_result": "${{ steps.check_workflows.outputs.result || 'fail' }}"
        }
        EOF
        cp /tmp/index_errors.txt /tmp/spellcheck-results/index_errors.txt 2>/dev/null || touch /tmp/spellcheck-results/index_errors.txt
        cp /tmp/workflows_errors.txt /tmp/spellcheck-results/workflows_errors.txt 2>/dev/null || touch /tmp/spellcheck-results/workflows_errors.txt

    - name: Upload results artifact
      if: always() && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: spellcheck-results
        path: /tmp/spellcheck-results/
        retention-days: 1

    - name: Fail if any spellcheck failed
      if: |
        steps.check_index.outputs.result == 'fail' ||
        steps.check_workflows.outputs.result == 'fail'
      run: |
        echo "❌ Spellcheck failed — see PR comment for details"
        exit 1
