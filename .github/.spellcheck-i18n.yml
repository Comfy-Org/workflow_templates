matrix:
- name: i18n JSON (English fields)
  sources:
  - 'scripts/i18n.json'
  aspell:
    lang: en
  dictionary:
    wordlists:
    - .github/.wordlist.txt
    encoding: utf-8
  pipeline:
  - pyspelling.filters.context:
      context_visible_first: true
      delimiters:
      - open: '"en":\s*"'
        close: '"'
