name: Preview Site

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'site/**'
  workflow_dispatch:

concurrency:
  group: preview-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      SKIP_AI_GENERATION: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/site-setup

      - name: Restore content cache
        uses: actions/cache@v4
        with:
          path: site/.content-cache
          key: content-cache-${{ hashFiles('templates/**', 'site/src/**') }}
          restore-keys: |
            content-cache-

      - name: Sync templates
        run: pnpm run sync:en-only
        working-directory: site

      - name: Build Astro site
        run: pnpm run build
        working-directory: site
        env:
          PUBLIC_HUB_API_URL: ${{ secrets.HUB_API_URL_PREVIEW }}
          PUBLIC_COMFY_CLOUD_URL: ${{ secrets.COMFY_CLOUD_URL_PREVIEW }}

      - name: Save PR metadata
        run: |
          mkdir -p preview-meta
          echo "${{ github.event.pull_request.number }}" > preview-meta/pr-number

      - name: Upload prebuilt output
        uses: actions/upload-artifact@v4
        with:
          name: vercel-preview-output
          path: |
            site/.vercel/output
            preview-meta/pr-number
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1
