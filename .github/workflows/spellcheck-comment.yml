name: Spellcheck Comment

on:
  workflow_run:
    workflows: [ "Spellcheck" ]
    types: [ completed ]

jobs:
  comment:
    name: Post spellcheck results
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
      actions: read
    steps:
    - name: Download results artifact
      uses: actions/github-script@v7
      id: download
      with:
        script: |
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: ${{ github.event.workflow_run.id }},
          });
          const artifact = artifacts.data.artifacts.find(a => a.name === 'spellcheck-results');
          if (!artifact) {
            core.setOutput('found', 'false');
            return;
          }
          core.setOutput('found', 'true');
          const download = await github.rest.actions.downloadArtifact({
            owner: context.repo.owner,
            repo: context.repo.repo,
            artifact_id: artifact.id,
            archive_format: 'zip',
          });
          const fs = require('fs');
          fs.writeFileSync('/tmp/spellcheck-results.zip', Buffer.from(download.data));

    - name: Extract artifact
      if: steps.download.outputs.found == 'true'
      run: unzip /tmp/spellcheck-results.zip -d /tmp/spellcheck-results/

    - name: Post PR comment
      if: steps.download.outputs.found == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          const results = JSON.parse(fs.readFileSync('/tmp/spellcheck-results/results.json', 'utf8'));
          const indexErrors    = fs.readFileSync('/tmp/spellcheck-results/index_errors.txt', 'utf8').trim();
          const workflowErrors = fs.readFileSync('/tmp/spellcheck-results/workflows_errors.txt', 'utf8').trim();
          const i18nErrors     = fs.readFileSync('/tmp/spellcheck-results/i18n_errors.txt', 'utf8').trim();

          const { pr_number, index_result, workflows_result, i18n_result } = results;

          const icon  = r => r === 'pass' ? '✅' : '❌';
          const label = r => r === 'pass' ? 'No issues found' : 'Misspelled words detected';

          let body = `## 🔤 Spellcheck Results\n\n`;
          body += `| Check | Status |\n|---|---|\n`;
          body += `| \`templates/index.json\` (titles & descriptions) | ${icon(index_result)} ${label(index_result)} |\n`;
          body += `| Workflow JSON notes (MarkdownNote / Note nodes) | ${icon(workflows_result)} ${label(workflows_result)} |\n`;
          body += `| \`scripts/i18n.json\` (English fields) | ${icon(i18n_result)} ${label(i18n_result)} |\n\n`;

          if (index_result !== 'pass' && indexErrors) {
            body += `<details>\n<summary>❌ index.json errors</summary>\n\n\`\`\`\n${indexErrors}\n\`\`\`\n</details>\n\n`;
          }
          if (workflows_result !== 'pass' && workflowErrors) {
            body += `<details>\n<summary>❌ Workflow notes errors</summary>\n\n\`\`\`\n${workflowErrors}\n\`\`\`\n</details>\n\n`;
          }
          if (i18n_result !== 'pass' && i18nErrors) {
            body += `<details>\n<summary>❌ i18n.json errors</summary>\n\n\`\`\`\n${i18nErrors}\n\`\`\`\n</details>\n\n`;
          }

          const allPass = index_result === 'pass' && workflows_result === 'pass' && i18n_result === 'pass';
          if (allPass) {
            body += `> All spellchecks passed! 🎉\n`;
          } else {
            body += `> Add legitimate technical terms to \`.github/.wordlist.txt\` to suppress false positives.\n`;
          }

          const marker = '<!-- spellcheck-bot -->';
          body = marker + '\n' + body;

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr_number,
          });

          const existing = comments.find(c => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body,
            });
          }
