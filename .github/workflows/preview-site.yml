name: Preview Site

on:
  pull_request:
    paths:
      - 'site/**'
      - 'templates/**'
  workflow_dispatch:

concurrency:
  group: preview-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      SKIP_AI_GENERATION: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/site-setup

      - name: Restore content cache
        uses: actions/cache@v4
        with:
          path: site/.content-cache
          key: content-cache-${{ hashFiles('templates/**', 'site/src/**') }}
          restore-keys: |
            content-cache-

      - name: Sync templates
        run: pnpm run sync:en-only
        working-directory: site

      - name: Validate preview Hub API URL secret
        env:
          HUB_API_URL_PREVIEW: ${{ secrets.HUB_API_URL_PREVIEW }}
          COMFY_CLOUD_URL_PREVIEW: ${{ secrets.COMFY_CLOUD_URL_PREVIEW }}
        run: |
          if [ -z "${HUB_API_URL_PREVIEW}" ]; then
            echo "Missing required GitHub secret: HUB_API_URL_PREVIEW"
            exit 1
          fi
          if [ -z "${COMFY_CLOUD_URL_PREVIEW}" ]; then
            echo "Missing required GitHub secret: COMFY_CLOUD_URL_PREVIEW"
            exit 1
          fi

      - name: Build Astro site
        run: pnpm run build
        working-directory: site
        env:
          PUBLIC_HUB_API_URL: ${{ secrets.HUB_API_URL_PREVIEW }}
          PUBLIC_COMFY_CLOUD_URL: ${{ secrets.COMFY_CLOUD_URL_PREVIEW }}

      - name: Deploy preview to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: site
          vercel-args: '--prebuilt'

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: vercel-preview
          message: |
            🚀 **Preview deployed:** ${{ steps.deploy.outputs.preview-url }}
