name: Refresh Run-Click Usage

# Keeps the `usage` field in templates/index*.json in step with real Algolia
# run-click data. Runs on template PRs and commits the refreshed numbers onto the
# PR branch, so whatever gets merged carries current usage.
#
# The website (templates.comfy.org) refreshes its own ranking separately via
# cron-rebuild-site.yml — this workflow is only for the published package.

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'templates/**.json'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Fork PRs can't be committed to.
    if: github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: refresh-run-click-usage-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      ALGOLIA_APP_ID: 4E0RO38HS8
      ALGOLIA_API_KEY: 684d998c36b67a9a9fce8fc2d8860579
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Fetch run_clicks and fold into index.json
        run: |
          pip install jsonschema # sync_data.py imports validate_templates, which needs it
          python scripts/sync/fetch_algolia_usage.py --templates-dir templates
          python scripts/sync/sync_data.py --templates-dir templates

      - name: Commit usage updates to PR
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add templates/index*.json
          if git diff --cached --quiet; then
            echo "✅ No usage changes needed"
            exit 0
          fi

          if ! git commit -m "Auto-sync template usage from Algolia run_clicks"; then
            echo "⚠️ Commit failed, retrying after rebase..."
            if ! git pull origin "${{ github.head_ref }}" --rebase; then
              echo "❌ Rebase hit a conflict. Manual intervention required."
              git status
              exit 1
            fi
            git commit -m "Auto-sync template usage from Algolia run_clicks"
          fi

          if ! git push origin HEAD; then
            echo "⚠️ Push failed, retrying after pull..."
            if ! git pull origin "${{ github.head_ref }}" --rebase; then
              echo "❌ Rebase hit a conflict. Manual intervention required."
              git status
              exit 1
            fi
            git push origin HEAD
          fi

          echo "✅ Usage updates committed to PR"
