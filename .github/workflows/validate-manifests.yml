name: Validate Manifests

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'templates/**'
      - 'blueprints/**'
      - 'packages/*/src/*/manifest.json'
      - 'packages/*/src/*/*.json'
      - 'scripts/validate/validate_manifests.py'
      - 'scripts/sync/sync_bundles.py'
      - 'scripts/sync/sync_blueprints.py'
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'blueprints/**'
      - 'packages/*/src/*/manifest.json'
      - 'packages/*/src/*/*.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            templates/*.json
            templates/logo/
            blueprints/
            bundles.json
            blueprints_bundles.json
            scripts/
            packages/
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Sync manifests first
        run: |
          python scripts/sync/sync_bundles.py
          python scripts/sync/sync_blueprints.py
          
      - name: Validate manifest entries
        run: |
          cd ${{ github.workspace }}
          python scripts/validate/validate_manifests.py
      
      - name: Check for orphaned templates
        run: |
          echo "🔍 Checking for templates without manifest entries..."
          excluded=$(python3 scripts/validate/list_pip_excluded.py)
          cd templates
          orphaned=0
          for json_file in *.json; do
            template_name="${json_file%.json}"
            if echo "$excluded" | grep -qx "$template_name"; then
              continue
            fi
            if ! grep -q "\"$json_file\"" ../packages/core/src/comfyui_workflow_templates_core/manifest.json; then
              echo "⚠️  Orphaned template: $json_file"
              orphaned=$((orphaned + 1))
            fi
          done
          if [ $orphaned -gt 0 ]; then
            echo "❌ Found $orphaned orphaned template(s). Run sync_bundles.py to fix."
            exit 1
          else
            echo "✅ No orphaned templates found"
          fi

      - name: Check for orphaned blueprints
        run: |
          echo "🔍 Checking for blueprints without manifest entries..."
          cd blueprints
          orphaned=0
          for json_file in *.json; do
            # Skip index files
            if [[ "$json_file" == index* ]]; then
              continue
            fi
            if ! grep -q "\"$json_file\"" ../packages/core/src/comfyui_workflow_templates_core/blueprints_manifest.json; then
              echo "⚠️  Orphaned blueprint: $json_file"
              orphaned=$((orphaned + 1))
            fi
          done
          if [ $orphaned -gt 0 ]; then
            echo "❌ Found $orphaned orphaned blueprint(s). Run sync_blueprints.py to fix."
            exit 1
          else
            echo "✅ No orphaned blueprints found"
          fi