name: ZZ Credential Probe (temporary)

# Throwaway diagnostic: determines which token, if any, can push a branch and
# open a PR in this repo. Delete once the answer is recorded.

on:
  workflow_dispatch:
  push:
    branches: [test/credential-probe]

permissions:
  contents: write
  pull-requests: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Identify each token
        env:
          GITHUB_TOKEN_V: ${{ secrets.GITHUB_TOKEN }}
          PAT: ${{ secrets.PAT_TOKEN }}
          PERSONAL: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          probe_identity() {
            local name="$1" tok="$2"
            echo "--- $name ---"
            if [ -z "$tok" ]; then echo "  (secret is empty/unset)"; return; fi
            login=$(GH_TOKEN="$tok" gh api user --jq .login 2>&1 || echo "N/A (app/installation token)")
            echo "  identity: $login"
            perm=$(GH_TOKEN="$tok" gh api repos/${{ github.repository }} --jq '.permissions' 2>&1 || echo "unreadable")
            echo "  permissions: $perm"
          }
          probe_identity "GITHUB_TOKEN" "$GITHUB_TOKEN_V"
          probe_identity "PAT_TOKEN" "$PAT"
          probe_identity "PERSONAL_ACCESS_TOKEN" "$PERSONAL"

      - name: Test push + PR creation per token
        env:
          GITHUB_TOKEN_V: ${{ secrets.GITHUB_TOKEN }}
          PAT: ${{ secrets.PAT_TOKEN }}
          PERSONAL: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Credential Probe"

          try_token() {
            local name="$1" tok="$2"
            echo ""
            echo "================ $name ================"
            if [ -z "$tok" ]; then echo "SKIP: secret empty"; return; fi

            local branch="probe/${name}-${RUN_ID}"
            git checkout -q -B "$branch" origin/main
            date > .probe-marker
            git add .probe-marker
            git commit -q -m "probe: $name"

            local url="https://x-access-token:${tok}@github.com/${{ github.repository }}.git"
            if git push -q "$url" "$branch" 2>&1 | tail -5; then
              echo "PUSH: OK"
            else
              echo "PUSH: FAILED"; git checkout -q main; return
            fi

            if GH_TOKEN="$tok" gh pr create --base main --head "$branch" \
                 --title "probe: $name (auto-close)" \
                 --body "Credential probe. Safe to close." 2>&1 | tail -5; then
              echo "PR CREATE: OK"
              GH_TOKEN="$tok" gh pr close "$branch" --delete-branch 2>&1 | tail -2 || true
            else
              echo "PR CREATE: FAILED"
              git push -q "$url" --delete "$branch" 2>&1 | tail -2 || true
            fi
            git checkout -q main
          }

          try_token "GITHUB_TOKEN" "$GITHUB_TOKEN_V"
          try_token "PAT_TOKEN" "$PAT"
          try_token "PERSONAL_ACCESS_TOKEN" "$PERSONAL"

          echo ""
          echo "================ direct push to main (expect ruleset rejection) ================"
          git checkout -q -B probe-main-test origin/main
          date > .probe-main-marker
          git add .probe-main-marker
          git commit -q -m "probe: direct main push"
          git push "https://x-access-token:${GITHUB_TOKEN_V}@github.com/${{ github.repository }}.git" \
            HEAD:main 2>&1 | tail -10 || echo "(rejected as expected)"
