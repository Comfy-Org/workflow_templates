# Triggers: (1) workflow_dispatch — always runs. (2) workflow_run after
# "Publish to PyPI" on main — runs only if that workflow succeeded AND
# repository variable DEPLOY_SITE_ON_PYPI_PUBLISH is not the string "false".
# To disable version-bump chain deploy: Settings > Secrets and variables >
# Actions > Variables — set DEPLOY_SITE_ON_PYPI_PUBLISH to false. Remove it or
# set to true to enable (matches historical behavior when unset).
name: Deploy Template Site

on:
  workflow_dispatch:
    inputs:
      skip_ai:
        description: 'Skip AI content generation'
        type: boolean
        default: false
      force_regenerate:
        description: 'Force regenerate all content (ignore cache)'
        type: boolean
        default: false
      template_filter:
        description: 'Regenerate specific template only (e.g. "flux_schnell")'
        type: string
        default: ''
  workflow_run:
    workflows: ["Publish to PyPI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && vars.DEPLOY_SITE_ON_PYPI_PUBLISH != 'false'
      )
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PUBLIC_POSTHOG_KEY: phc_iKfK86id4xVYws9LybMje0h44eGtfwFgRPIBehmy8rO
      PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA_MEASUREMENT_ID }}
      # Search-only Algolia key (public-safe); ranking sourced from templates_index.
      PUBLIC_ALGOLIA_APP_ID: 4E0RO38HS8
      PUBLIC_ALGOLIA_SEARCH_KEY: 684d998c36b67a9a9fce8fc2d8860579
      SKIP_AI_GENERATION: ${{ inputs.skip_ai && 'true' || '' }}
      FORCE_AI_REGENERATE: ${{ inputs.force_regenerate && 'true' || '' }}
      AI_TEMPLATE_FILTER: ${{ inputs.template_filter }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/site-setup

      - name: Restore content cache
        uses: actions/cache@v4
        with:
          path: site/.content-cache
          key: content-cache-${{ hashFiles('templates/**', 'site/src/**') }}
          restore-keys: |
            content-cache-

      - name: Sync templates
        run: pnpm run sync
        working-directory: site

      - name: Build Astro site
        run: pnpm run build
        working-directory: site
        env:
          PUBLIC_HUB_API_URL: ${{ secrets.HUB_API_URL_PRODUCTION }}
          PUBLIC_COMFY_CLOUD_URL: ${{ secrets.COMFY_CLOUD_URL_PRODUCTION }}
          PUBLIC_APPROVED_ONLY: 'true'

      - name: Deploy to Vercel
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          stdout_file="$RUNNER_TEMP/vercel-production.stdout"
          stderr_file="$RUNNER_TEMP/vercel-production.stderr"
          site_output_dir="$GITHUB_WORKSPACE/site/.vercel/output"
          root_output_dir="$GITHUB_WORKSPACE/.vercel/output"

          if [ ! -d "$site_output_dir" ]; then
            echo "Expected prebuilt output in $site_output_dir" >&2
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/.vercel"
          rm -rf "$root_output_dir"
          cp -R "$site_output_dir" "$root_output_dir"

          if npx vercel@latest deploy --cwd "$GITHUB_WORKSPACE" --prebuilt --prod --yes \
            --token="$VERCEL_TOKEN" >"$stdout_file" 2>"$stderr_file"; then
            cat "$stderr_file" >&2
            cat "$stdout_file"
          else
            cat "$stderr_file" >&2
            cat "$stdout_file"
            exit 1
          fi
