name: Site CI

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/site-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── Lint (no build needed) ───────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/site-setup

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: pnpm run lint 2>&1 | tee lint-output.txt

      - name: Check Prettier formatting
        id: format
        continue-on-error: true
        run: pnpm run format:check 2>&1 | tee format-output.txt

      - name: Astro Check
        run: pnpm run check

      - name: Unit Tests
        run: pnpm test

      - name: Validate Templates
        run: pnpm run validate:templates

      - name: Build comment body
        if: always() && github.event_name == 'pull_request'
        id: comment
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const lintOutcome = '${{ steps.lint.outcome }}';
            const formatOutcome = '${{ steps.format.outcome }}';
            const allPassed = lintOutcome === 'success' && formatOutcome === 'success';

            const icon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const lines = [
              '<!-- site-lint-results -->',
              '## 🧹 Lint & Format Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| ESLint | ${icon(lintOutcome)} ${lintOutcome} |`,
              `| Prettier | ${icon(formatOutcome)} ${formatOutcome} |`,
            ];

            if (!allPassed) {
              lines.push('', '<details>', '<summary>Error details</summary>', '');
              if (lintOutcome !== 'success') {
                let lintOutput = '';
                try {
                  lintOutput = fs.readFileSync('site/lint-output.txt', 'utf8').trim();
                } catch (e) { lintOutput = 'Could not read lint output'; }
                lines.push('**ESLint:**', '```', lintOutput.slice(-2000), '```', '');
              }
              if (formatOutcome !== 'success') {
                let formatOutput = '';
                try {
                  formatOutput = fs.readFileSync('site/format-output.txt', 'utf8').trim();
                } catch (e) { formatOutput = 'Could not read format output'; }
                lines.push('**Prettier:**', '```', formatOutput.slice(-2000), '```', '');
              }
              lines.push(
                '</details>',
                '',
                'To fix locally:',
                '```bash',
                'cd site',
                'pnpm run lint:fix && pnpm run format',
                '```',
              );
            }

            lines.push('', '---', '*Generated by Site CI workflow*');
            return lines.join('\n');

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && steps.comment.outputs.result
        uses: ./.github/actions/upsert-pr-comment
        with:
          marker: '<!-- site-lint-results -->'
          body: ${{ steps.comment.outputs.result }}

      - name: Fail if checks failed
        if: steps.lint.outcome == 'failure' || steps.format.outcome == 'failure'
        run: exit 1

  # ─── Build (shared by downstream jobs) ────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/site-setup

      - name: Build site
        run: pnpm run build
        env:
          SKIP_AI_GENERATION: 'true'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site/dist
          retention-days: 1

  # ─── Lighthouse (uses shared build) ───────────────────────────────────
  lighthouse:
    name: Lighthouse
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/site-setup

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: site/lighthouserc.json
          artifactName: lighthouse-results
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Build comment body
        if: always() && github.event_name == 'pull_request'
        id: comment
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');
            const path = require('path');

            let results = [];
            const lhciDir = '.lighthouseci';
            try {
              const files = fs.readdirSync(lhciDir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
              for (const file of files) {
                const raw = fs.readFileSync(path.join(lhciDir, file), 'utf8');
                const lhr = JSON.parse(raw);
                results.push({
                  url: lhr.finalUrl || lhr.requestedUrl || 'unknown',
                  performance: Math.round((lhr.categories?.performance?.score || 0) * 100),
                  accessibility: Math.round((lhr.categories?.accessibility?.score || 0) * 100),
                  bestPractices: Math.round((lhr.categories?.['best-practices']?.score || 0) * 100),
                  seo: Math.round((lhr.categories?.seo?.score || 0) * 100),
                });
              }
            } catch (e) {
              // No results available
            }

            if (results.length === 0) {
              return '';
            }

            const scoreEmoji = (score) => {
              if (score >= 90) return '🟢';
              if (score >= 50) return '🟠';
              return '🔴';
            };

            const lines = [
              '<!-- site-lighthouse-results -->',
              '## ⚡ Lighthouse Results',
              '',
              '| URL | Performance | Accessibility | Best Practices | SEO |',
              '|-----|-------------|---------------|----------------|-----|',
            ];

            for (const r of results) {
              const urlPath = new URL(r.url).pathname || '/';
              lines.push(
                `| \`${urlPath}\` | ${scoreEmoji(r.performance)} ${r.performance} | ${scoreEmoji(r.accessibility)} ${r.accessibility} | ${scoreEmoji(r.bestPractices)} ${r.bestPractices} | ${scoreEmoji(r.seo)} ${r.seo} |`
              );
            }

            lines.push(
              '',
              '_Scores are out of 100. 🟢 90+ | 🟠 50-89 | 🔴 0-49_',
              '',
              '---',
              '*Generated by Site CI workflow*',
            );

            return lines.join('\n');

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && steps.comment.outputs.result
        uses: ./.github/actions/upsert-pr-comment
        with:
          marker: '<!-- site-lighthouse-results -->'
          body: ${{ steps.comment.outputs.result }}

  # ─── SEO Audit (uses shared build) ────────────────────────────────────
  seo-audit:
    name: SEO Audit
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/site-setup

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: site

      - name: Validate sitemap
        id: sitemap
        continue-on-error: true
        run: |
          echo "## Sitemap Validation" >> $GITHUB_STEP_SUMMARY
          if pnpm validate:sitemap 2>&1 | tee sitemap-output.txt; then
            echo "✅ Sitemap validation passed" >> $GITHUB_STEP_SUMMARY
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "❌ Sitemap validation failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat sitemap-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Run SEO audit
        id: seo
        continue-on-error: true
        run: |
          echo "## SEO Audit" >> $GITHUB_STEP_SUMMARY
          if pnpm audit:seo 2>&1 | tee seo-output.txt; then
            echo "✅ SEO audit passed" >> $GITHUB_STEP_SUMMARY
            echo "status=passed" >> $GITHUB_OUTPUT
          else
            echo "⚠️ SEO audit found issues" >> $GITHUB_STEP_SUMMARY
            echo "status=issues" >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f seo-summary.json ]; then
            echo '<details><summary>Full SEO Summary</summary>' >> $GITHUB_STEP_SUMMARY
            echo '' >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat seo-summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo '</details>' >> $GITHUB_STEP_SUMMARY
          else
            echo '_No seo-summary.json found_' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check internal links
        id: links
        continue-on-error: true
        run: |
          echo "## Link Check" >> $GITHUB_STEP_SUMMARY

          DIST_DIR="dist"
          if [ ! -d "$DIST_DIR" ]; then
            echo "⚠️ No build output found at $DIST_DIR" >> $GITHUB_STEP_SUMMARY
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          BROKEN_FILE="broken-links.txt"
          : > "$BROKEN_FILE"
          BROKEN_COUNT=0
          TOTAL_COUNT=0

          # English pages only — localized pages are rendered on-demand (SSR)
          for htmlfile in $(find "$DIST_DIR" -name '*.html' \
            -not -path "$DIST_DIR/ar/*" -not -path "$DIST_DIR/es/*" -not -path "$DIST_DIR/fr/*" \
            -not -path "$DIST_DIR/ja/*" -not -path "$DIST_DIR/ko/*" -not -path "$DIST_DIR/pt-BR/*" \
            -not -path "$DIST_DIR/ru/*" -not -path "$DIST_DIR/tr/*" -not -path "$DIST_DIR/zh/*" \
            -not -path "$DIST_DIR/zh-TW/*" | head -500); do
            hrefs=$(grep -oP 'href="(/[^"]*)"' "$htmlfile" | sed 's/href="//;s/"$//' || true)
            for href in $hrefs; do
              TOTAL_COUNT=$((TOTAL_COUNT + 1))
              clean="${href%%#*}"
              clean="${clean%%\?*}"
              if [ -z "$clean" ] || [ "$clean" = "/" ]; then
                continue
              fi

              found=false

              # If it has a file extension, treat as an asset
              if [[ "$clean" =~ \.[a-zA-Z0-9]+$ ]]; then
                [ -f "${DIST_DIR}${clean}" ] && found=true
              else
                # Route-like URL: try both Astro output formats
                base="${clean%/}"
                [ -f "${DIST_DIR}${base}/index.html" ] && found=true
                [ "$found" = false ] && [ -f "${DIST_DIR}${base}.html" ] && found=true
                [ "$found" = false ] && [ -f "${DIST_DIR}${clean}" ] && found=true
                [ "$found" = false ] && [ -d "${DIST_DIR}${base}" ] && found=true
              fi

              if [ "$found" = false ]; then
                BROKEN_COUNT=$((BROKEN_COUNT + 1))
                echo "- \`${href}\` (in ${htmlfile#${DIST_DIR}/})" >> "$BROKEN_FILE"
              fi
            done
          done

          if [ "$BROKEN_COUNT" -eq 0 ]; then
            echo "✅ All internal links valid ($TOTAL_COUNT checked)" >> $GITHUB_STEP_SUMMARY
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "broken_count=0" >> $GITHUB_OUTPUT
            echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          else
            echo "❌ Found $BROKEN_COUNT broken internal links out of $TOTAL_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "First 50 broken links:" >> $GITHUB_STEP_SUMMARY
            head -n 50 "$BROKEN_FILE" >> $GITHUB_STEP_SUMMARY
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "broken_count=$BROKEN_COUNT" >> $GITHUB_OUTPUT
            echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Upload SEO reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-seo-reports
          path: |
            site/seo-output.txt
            site/seo-summary.json
            site/broken-links.txt
          if-no-files-found: ignore

      - name: Build comment body
        if: always() && github.event_name == 'pull_request'
        id: comment
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const fs = require('fs');

            const sitemapStatus = '${{ steps.sitemap.outputs.status }}';
            const seoStatus = '${{ steps.seo.outputs.status }}';
            const linksStatus = '${{ steps.links.outputs.status }}';
            const brokenCount = '${{ steps.links.outputs.broken_count }}';
            const totalCount = '${{ steps.links.outputs.total_count }}';

            const icon = (status) => {
              if (status === 'passed') return '✅';
              if (status === 'failed') return '❌';
              if (status === 'issues') return '⚠️';
              return '❓';
            };

            let seoSummary = '';
            try {
              const raw = fs.readFileSync('site/seo-summary.json', 'utf8');
              const data = JSON.parse(raw);
              const lines = [
                `**${data.pagesScanned}** pages scanned, **${data.pagesClean}** clean, **${data.pagesWithIssues}** with issues`,
                '',
                `| Severity | Count |`,
                `|----------|-------|`,
                `| ✖ Critical | ${data.critical} |`,
                `| ⚠ Warning | ${data.warnings} |`,
                `| ℹ Info | ${data.info} |`,
              ];
              if (data.topIssues && data.topIssues.length > 0) {
                lines.push('', '**Most common issues:**');
                for (const issue of data.topIssues.slice(0, 5)) {
                  lines.push(`- ${issue.message} (×${issue.count})`);
                }
              }
              seoSummary = lines.join('\n');
            } catch (e) {
              try {
                const raw = fs.readFileSync('site/seo-output.txt', 'utf8');
                const clean = raw.replace(/\x1b\[[0-9;]*m/g, '');
                const summaryMatch = clean.match(/SUMMARY[\s\S]*$/);
                seoSummary = summaryMatch ? '```\n' + summaryMatch[0].slice(0, 1500) + '\n```' : 'Could not parse SEO output';
              } catch (e2) {
                seoSummary = 'Could not read SEO output';
              }
            }

            const linksDetail = linksStatus === 'passed'
              ? `All internal links valid (${totalCount} checked)`
              : `${brokenCount} broken internal links out of ${totalCount} checked`;

            const lines = [
              '<!-- site-seo-audit-results -->',
              '## 🔍 SEO Audit Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Sitemap Validation | ${icon(sitemapStatus)} ${sitemapStatus} |`,
              `| SEO Audit | ${icon(seoStatus)} ${seoStatus} |`,
              `| Internal Links | ${icon(linksStatus)} ${linksStatus} |`,
              '',
              '<details>',
              '<summary>📊 SEO Audit Details</summary>',
              '',
              seoSummary,
              '',
              '</details>',
              '',
              '<details>',
              '<summary>🔗 Link Check Details</summary>',
              '',
              linksDetail,
              '',
              '</details>',
              '',
              '---',
              '*Generated by Site CI workflow*',
            ];

            return lines.join('\n');

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && steps.comment.outputs.result
        uses: ./.github/actions/upsert-pr-comment
        with:
          marker: '<!-- site-seo-audit-results -->'
          body: ${{ steps.comment.outputs.result }}

      - name: Fail if critical issues
        run: |
          if [ "${{ steps.sitemap.outputs.status }}" = "failed" ]; then
            echo "Sitemap validation failed"
            exit 1
          fi
          if [ "${{ steps.links.outputs.status }}" = "failed" ]; then
            echo "⚠️ Broken internal links found (${{ steps.links.outputs.broken_count }}/${{ steps.links.outputs.total_count }})"
            echo "Note: CI builds use SKIP_AI_GENERATION=true which only generates top-50 template pages."
            echo "Listing pages link to all 300+ templates, so broken links to non-generated pages are expected."
          fi
