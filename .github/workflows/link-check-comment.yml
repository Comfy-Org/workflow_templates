name: Link Checker Comment

on:
  workflow_run:
    workflows: ["Link Checker"]
    types: [completed]

jobs:
  comment:
    name: Post link-check results on PR
    runs-on: ubuntu-latest
    # Same pattern as Spellcheck Comment: workflow_run uses base-repo context, so
    # GITHUB_TOKEN can comment on fork PRs (untrusted fork code cannot steal write token).
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Download PR comment artifact
        id: download
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }},
            });
            const artifact = artifacts.data.artifacts.find(a => a.name === 'link-check-results');
            if (!artifact) {
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            require('fs').writeFileSync('/tmp/link-check-results.zip', Buffer.from(download.data));

      - name: Extract artifact
        if: steps.download.outputs.found == 'true'
        run: unzip /tmp/link-check-results.zip -d /tmp/link-check-results/

      - name: Comment on PR when links failed
        if: steps.download.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const readFile = (p) => {
              try {
                return fs.readFileSync(p, 'utf8');
              } catch {
                return '';
              }
            };

            const results = JSON.parse(readFile('/tmp/link-check-results/results.json'));
            const pr_number = results.pr_number;
            const link_errors = results.link_errors === true || results.link_errors === 'true';
            if (!link_errors || !pr_number) {
              core.info('No broken links or missing PR number; skipping comment.');
              return;
            }

            let lycheeReport = readFile('/tmp/link-check-results/lychee-report.md').trim();
            if (!lycheeReport) {
              lycheeReport = 'Unable to read lychee report';
            }

            const lycheeLines = lycheeReport.split('\n');
            const errors = [];
            let inErrorBlock = false;

            for (const line of lycheeLines) {
              if (line.startsWith('##')) {
                if (line.startsWith('### Errors in') || line.startsWith('🚫 Errors')) {
                  inErrorBlock = true;
                  continue;
                }
                inErrorBlock = false;
                continue;
              }
              if (inErrorBlock && (line.startsWith('* [') || line.startsWith('| ['))) {
                errors.push(line);
              }
            }

            const hasParsedErrors = errors.length > 0;
            const lycheeErrorsOnly = hasParsedErrors ? errors.join('\n') : '';

            let excludedReport = readFile('/tmp/link-check-results/excluded_links.txt').trim();

            const maxLength = 60000;
            let bodyErrors;
            if (hasParsedErrors) {
              bodyErrors =
                lycheeErrorsOnly.length > maxLength
                  ? lycheeErrorsOnly.substring(0, maxLength) + '\n\n...(Report truncated due to length)'
                  : lycheeErrorsOnly;
            } else {
              bodyErrors =
                'Lychee reported an error (non-zero exit) but no broken-link rows were parsed. Please check artifacts for details.';
            }

            let body = `## ❌ Broken Links Found\n\n${bodyErrors}\n\n`;
            if (excludedReport) {
              body += `**Excluded:**\n${excludedReport}\n\n`;
            }
            body +=
              '**Fix:** Update or remove broken URLs in workflow files. Check workflow artifacts for full report.';

            const marker = '<!-- linkcheck-bot -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                body,
              });
            }
